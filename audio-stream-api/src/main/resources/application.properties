spring.application.name=audio-stream-api
server.port=8080
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota

# Error handling
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=false


# App config
audio.storage.path=/Volumes/HUSO SSD/Documentos/4SoftwareDevelopers/audio-stream-4sd/audio-stream-api/storage
audio.policy.max-duration-seconds=60

# Security config
app.security.jwt.secret=${JWT_SECRET:your-256-bit-secret-key-here-must-be-long-enough}
app.security.jwt.expiration-ms=3600000
app.security.jwt.refresh-token-expiry-ms=86400000

# Rate limiting
app.ratelimit.enabled=true
app.ratelimit.ip-requests-per-minute=100
app.ratelimit.token-requests-per-minute=50